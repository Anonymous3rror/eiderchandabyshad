<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>একাডেমিক ড্যাশবোর্ড</title>
    <style>
        /* ===== DARK MODE (default) ===== */
        :root {
            --bg-primary: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            --card-bg: rgba(30, 30, 50, 0.95);
            --text-primary: #e0e6ed;
            --text-secondary: #9aa5b4;
            --accent-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --shadow: 0 20px 45px rgba(0,0,0,0.5);
            --glass: rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.11);
            --divider: rgba(255,255,255,0.09);
            --todo-bg: rgba(255,255,255,0.05);
            --has-class-bg: linear-gradient(135deg, #6366f1, #7c3aed);
            --has-class-shadow: rgba(99,102,241,0.4);
            --today-bg: linear-gradient(135deg, #f093fb, #f5576c);
            --today-glow: rgba(240,147,251,0.5);
            --selected-bg: linear-gradient(135deg, #4facfe, #00f2fe);
            --selected-glow: rgba(79,172,254,0.55);
            --hover-bg: linear-gradient(135deg, #43e97b, #38f9d7);
        }

        [data-theme="light"] {
            --bg-primary: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 45%, #ede9fe 100%);
            --card-bg: rgba(255,255,255,0.96);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-primary: linear-gradient(135deg, #6366f1, #8b5cf6);
            --shadow: 0 16px 40px rgba(99,102,241,0.13);
            --glass: rgba(99,102,241,0.06);
            --glass-border: rgba(99,102,241,0.14);
            --todo-bg: rgba(99,102,241,0.05);
            --divider: rgba(99,102,241,0.1);
            --has-class-bg: linear-gradient(135deg, #6366f1, #8b5cf6);
            --has-class-shadow: rgba(99,102,241,0.3);
            --today-bg: linear-gradient(135deg, #ec4899, #f43f5e);
            --today-glow: rgba(236,72,153,0.35);
            --selected-bg: linear-gradient(135deg, #0ea5e9, #06b6d4);
            --selected-glow: rgba(14,165,233,0.4);
            --hover-bg: linear-gradient(135deg, #10b981, #34d399);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 24px 20px; transition: background 0.4s; }

        .header { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto 36px; }
        h1 { font-size: 2.1em; font-weight: 800; background: var(--accent-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 420px 1fr 340px; gap: 26px; }
        .section { background: var(--card-bg); border-radius: 22px; padding: 28px; box-shadow: var(--shadow); border: 1px solid var(--glass-border); }
        .section-title { font-size: 1.25em; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--divider); }

        /* CALENDAR STYLE */
        .month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .nav-btn { background: var(--accent-primary); color: white; border: none; padding: 8px 18px; border-radius: 50px; cursor: pointer; font-size: 13px; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--accent-primary); color: white; padding: 12px 6px; font-size: 11px; text-transform: uppercase; }
        td { padding: 8px 4px; text-align: center; cursor: pointer; }
        .day-cell { font-size: 16px; font-weight: 700; border-radius: 10px; transition: 0.2s; }
        .day-cell:hover { background: var(--hover-bg) !important; color: white !important; transform: scale(1.1); }
        .has-class { background: var(--has-class-bg) !important; color: white !important; }
        .today { background: var(--today-bg) !important; color: white !important; box-shadow: 0 0 15px var(--today-glow); }
        .selected { background: var(--selected-bg) !important; color: white !important; transform: scale(1.1); }

        /* SCHEDULE STYLE */
        .day-card { background: var(--glass); border-radius: 16px; padding: 18px; border: 1px solid var(--glass-border); margin-bottom: 12px; }
        .class-subject { font-size: 1.05em; font-weight: 700; margin-bottom: 8px; }
        .class-meta { font-size: 0.85em; color: var(--text-secondary); margin-bottom: 4px; }

        /* TO-DO STYLE (Private) */
        .todo-stats { display: flex; gap: 10px; margin-bottom: 18px; }
        .stat-pill { flex: 1; text-align: center; padding: 8px; background: var(--glass); border-radius: 10px; font-size: 0.8em; }
        .stat-pill span { display: block; font-size: 1.4em; font-weight: 800; background: var(--accent-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .todo-list { display: flex; flex-direction: column; gap: 8px; }
        .todo-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--todo-bg); border-radius: 12px; border: 1px solid var(--glass-border); }
        .todo-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #6366f1; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
        .todo-check.done { background: var(--accent-primary); border-color: transparent; color: white; }
        .todo-text.done { text-decoration: line-through; color: var(--text-secondary); opacity: 0.6; }

        .theme-toggle { background: var(--accent-primary); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; }

        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>📚 একাডেমিক ড্যাশবোর্ড</h1>
        <button class="theme-toggle" id="themeToggle">☀️</button>
    </div>

    <div class="container">
        <div class="section">
            <div class="month-nav">
                <button class="nav-btn" onclick="prevMonth()">◀</button>
                <span class="month-label" id="monthTitle"></span>
                <button class="nav-btn" onclick="nextMonth()">▶</button>
            </div>
            <table id="calendarTable"></table>
        </div>

        <div class="section">
            <div class="section-title" id="selectedDayTitle">🗓 তারিখ নির্বাচন করুন</div>
            <div id="scheduleContent">
                <div style="text-align:center; padding: 40px; color: var(--text-secondary);">ক্যালেন্ডার থেকে তারিখ দেখুন</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">📝 বাড়ির কাজ (Homework)</div>
            <div class="todo-stats">
                <div class="stat-pill"><span id="totalCount">0</span>মোট</div>
                <div class="stat-pill"><span id="doneCount">0</span>সম্পন্ন</div>
            </div>
            <div class="todo-list" id="todoList"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // ১. আপনার ব্যক্তিগত কাজগুলো এখানে যোগ করুন
        // ==========================================
        const myTodos = [
            { text: "সয়েল", done: false },
            { text: "বোটানি", done: false },
            { text: "ইংরেজি", done: false },
            { text: "কেমিস্ট্রি", done: false }
        ];

        // ==========================================
        // ২. ক্লাসের রুটিন ডাটা
        // ==========================================
        function getDaySchedule(dayIndex) {
            const schedules = {
                0: { day: 'রবিবার', classes: [
                    { time: '10:30–11:15 AM', subject: 'Soil Science', room: 'Room 104', teacher: 'Sabirun Nahar' },
                    { time: '11:45–12:30 PM', subject: 'English', room: 'Room 319', teacher: '-' }
                ]},
                1: { day: 'সোমবার', classes: [
                    { time: '10:15–11:00 AM', subject: 'Soil Science', room: 'Room 104', teacher: 'MD. Abdul Hamid Al Azad' },
                    { time: '11:45–12:30 PM', subject: 'Botany', room: 'Room 324', teacher: 'Mohammad Asaduzzaman' },
                    { time: '01:15–02:00 PM', subject: 'Chemistry', room: 'Room 216', teacher: 'Afroza Sultana Simu' }
                ]},
                2: { day: 'মঙ্গলবার', classes: [
                    { time: '11:00–11:45 AM', subject: 'Botany', room: 'Room 324', teacher: 'Manoj Mandal' },
                    { time: '12:00–12:45 PM', subject: 'Soil Science', room: 'Room 104', teacher: 'Mohammad Nazrul Islam' },
                    { time: '01:15–02:00 PM', subject: 'Chemistry', room: 'Room 216', teacher: 'Mohammad Abdul Awal' }
                ]},
                3: { day: 'বুধবার', classes: [
                    { time: '10:15–11:00 AM', subject: 'English', room: 'Room 319', teacher: '-' },
                    { time: '11:00–11:45 AM', subject: 'Soil Science', room: 'Room 104', teacher: 'Mithila Dev' }
                ]},
                4: { day: 'বৃহস্পতিবার', classes: [
                    { time: '11:00–11:45 AM', subject: 'English', room: 'Room 319', teacher: '-' },
                    { time: '11:45–12:30 PM', subject: 'Soil Science', room: 'Room 104', teacher: 'MD. Abdul Hamid Al Azad' },
                    { time: '01:15–02:00 PM', subject: 'Chemistry', room: 'Room 216', teacher: 'Mst. Shahanaz Siddika' }
                ]},
                5: { day: 'শুক্রবার', classes: [] },
                6: { day: 'শনিবার', classes: [] }
            };
            return schedules[dayIndex] || { day: '', classes: [] };
        }

        // CALENDAR LOGIC
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        const monthNames = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];

        function generateCalendar(year, month) {
            document.getElementById('monthTitle').textContent = `${monthNames[month]} ${year}`;
            const table = document.getElementById('calendarTable');
            table.innerHTML = `<tr><th>র</th><th>সো</th><th>ম</th><th>বু</th><th>বৃ</th><th>শু</th><th>শ</th></tr>`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toLocaleDateString('en-CA');

            let row = document.createElement('tr');
            for (let i = 0; i < firstDay; i++) row.appendChild(document.createElement('td'));

            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateStr = date.toISOString().split('T')[0];
                const dayIndex = date.getDay();

                const cell = document.createElement('td');
                cell.className = 'day-cell';
                cell.textContent = day;
                cell.dataset.date = dateStr;
                cell.dataset.dayindex = dayIndex;

                if (getDaySchedule(dayIndex).classes.length > 0) cell.classList.add('has-class');
                if (dateStr === todayStr) cell.classList.add('today');

                row.appendChild(cell);
                if ((firstDay + day) % 7 === 0 || day === daysInMonth) {
                    table.appendChild(row);
                    row = document.createElement('tr');
                }
            }
        }

        function showSchedule(dateStr, dayIndex) {
            const sched = getDaySchedule(parseInt(dayIndex));
            const div = document.getElementById('scheduleContent');
            const title = document.getElementById('selectedDayTitle');
            const [y, m, d] = dateStr.split('-');
            
            title.textContent = `🗓 ${d}/${m}/${y} — ${sched.day}`;
            if (sched.classes.length === 0) {
                div.innerHTML = `<div class="no-schedule"><div style="font-size:2.8em;margin-bottom:12px">🎉</div>${sched.day}<br><small style="opacity:.7">সাপ্তাহিক ছুটি — কোনো ক্লাস নেই</small></div>`;
                return;
            }

            div.innerHTML = sched.classes.map((cls, i) => `
                <div class="day-card">
                    <div class="class-subject">📖 ${cls.subject}</div>
                    <div class="class-meta">⏰ ${cls.time} | 🚪 ${cls.room}</div>
                    <div class="class-meta">👨‍🏫 ${cls.teacher}</div>
                </div>
            `).join('');
        }

        // RENDER TO-DO
        function renderTodos() {
            const list = document.getElementById('todoList');
            document.getElementById('totalCount').textContent = myTodos.length;
            document.getElementById('doneCount').textContent = myTodos.filter(t => t.done).length;

            list.innerHTML = myTodos.map(todo => `
                <div class="todo-item">
                    <div class="todo-check ${todo.done ? 'done' : ''}">${todo.done ? '✓' : ''}</div>
                    <div class="todo-text ${todo.done ? 'done' : ''}">${todo.text}</div>
                </div>
            `).join('');
        }

        // NAV & EVENTS
        function prevMonth() { currentMonth--; if(currentMonth<0){currentMonth=11; currentYear--;} generateCalendar(currentYear, currentMonth); }
        function nextMonth() { currentMonth++; if(currentMonth>11){currentMonth=0; currentYear++;} generateCalendar(currentYear, currentMonth); }

        document.addEventListener('click', e => {
            if (e.target.classList.contains('day-cell')) {
                document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
                e.target.classList.add('selected');
                showSchedule(e.target.dataset.date, e.target.dataset.dayindex);
            }
        });

        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const isLight = document.body.getAttribute('data-theme') === 'light';
            document.body.setAttribute('data-theme', isLight ? 'dark' : 'light');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
        });

        generateCalendar(currentYear, currentMonth);
        renderTodos();
    </script>
</body>
<h4>Created by Shad and Raihan helps with information.</h4>
</html>
